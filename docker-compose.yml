services:
  api:
    build: .
    container_name: crux-ngrok-api
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    command:
      - "http"
      - "api:4000"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - api
